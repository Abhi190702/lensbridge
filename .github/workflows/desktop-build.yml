name: Desktop Build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/desktop/**"
      - "packages/**"

jobs:
  desktop:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @lensbridge/desktop build
      - run: pnpm check:rust
