name: Phone Build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/phone/**"
      - "packages/shared/**"

jobs:
  phone:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @lensbridge/phone typecheck
      - run: pnpm --filter @lensbridge/phone build
